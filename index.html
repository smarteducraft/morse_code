<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>빛으로 숫자 신호 보내기 (V1.09)</title>
    <!--
        빛으로 숫자 신호 보내기

        버전 히스토리
        V1.07
        - 버전 표기를 V1.07로 업데이트
        - 기존 기능 및 UI 구성은 그대로 유지

        V1.08
        - 기능/설정/JS 로직은 그대로 유지한 채 전체 UI 디자인 리뉴얼
        - 알파세대 취향의 세련된 키즈 에듀테크 스타일 반영
        - 둥근 카드형 레이아웃, 부드러운 그림자, 은은한 그라디언트 적용
        - 큰 버튼, 높은 가독성, 직관적인 정보 위계로 시각 구조 개선
        - 모바일/태블릿/PC 반응형 디자인 완성도 향상

        V1.09
        - 상단 버전 칩 문구가 화면에 출력되지 않도록 변경
        - 숫자 저장 / 숫자 확인 / 지우기 버튼 크기를 더 적절한 크기로 조정
        - 기능/설정/JS 로직은 그대로 유지
    -->
    <style>
        :root {
            --bg-1: #f7f9ff;
            --bg-2: #eef8ff;
            --bg-3: #fff7ef;
            --bg-4: #f5efff;

            --card-bg: rgba(255, 255, 255, 0.82);
            --card-border: rgba(255, 255, 255, 0.92);
            --card-solid: #ffffff;

            --primary: #6d5efc;
            --primary-2: #8b7bff;
            --blue: #42a5ff;
            --mint: #35d6b5;
            --yellow: #ffd84d;
            --pink: #ff77b7;
            --orange: #ffab5b;

            --text-primary: #1f2a44;
            --text-secondary: #5f6b85;
            --text-muted: #8d96ab;
            --text-soft: #6f7b91;

            --shadow-xs: 0 6px 18px rgba(79, 104, 155, 0.08);
            --shadow-sm: 0 12px 28px rgba(84, 104, 145, 0.12);
            --shadow-md: 0 18px 42px rgba(79, 96, 136, 0.16);
            --shadow-lg: 0 28px 60px rgba(73, 86, 118, 0.18);

            --radius-sm: 16px;
            --radius-md: 22px;
            --radius-lg: 28px;
            --radius-xl: 34px;
            --radius-pill: 999px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text-primary);
            overflow-x: hidden;
            background:
                radial-gradient(circle at 10% 12%, rgba(66, 165, 255, 0.18) 0%, rgba(66, 165, 255, 0) 22%),
                radial-gradient(circle at 88% 14%, rgba(255, 119, 183, 0.16) 0%, rgba(255, 119, 183, 0) 24%),
                radial-gradient(circle at 84% 84%, rgba(53, 214, 181, 0.15) 0%, rgba(53, 214, 181, 0) 22%),
                radial-gradient(circle at 16% 86%, rgba(255, 216, 77, 0.18) 0%, rgba(255, 216, 77, 0) 22%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 35%, var(--bg-3) 68%, var(--bg-4) 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(28px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.55;
        }

        body::before {
            width: 220px;
            height: 220px;
            left: -50px;
            top: 54px;
            background: rgba(109, 94, 252, 0.13);
        }

        body::after {
            width: 240px;
            height: 240px;
            right: -56px;
            bottom: 38px;
            background: rgba(66, 165, 255, 0.14);
        }

        .app-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: appFade 0.7s ease;
        }

        @keyframes appFade {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            padding-top: 4px;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #6554ff 0%, #7b6eff 34%, #2f8fff 68%, #21c7d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-wrap: balance;
        }

        .sub-description {
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: var(--radius-pill);
            box-shadow: var(--shadow-xs);
            color: var(--text-secondary);
            font-size: 0.96rem;
            font-weight: 800;
        }

        .sub-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(320px, 0.85fr) minmax(340px, 1.15fr);
            gap: 24px;
            align-items: stretch;
        }

        .card {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px;
            border-radius: var(--radius-xl);
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-lg);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0) 28%),
                radial-gradient(circle at top right, rgba(109,94,252,0.09) 0%, rgba(109,94,252,0) 30%);
            pointer-events: none;
        }

        .card > * {
            position: relative;
            z-index: 1;
        }

        .interaction-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            min-height: 100%;
        }

        .label-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
            font-weight: 900;
            color: #0f766e;
            background: linear-gradient(135deg, #ecfeff 0%, #dcfce7 100%);
            padding: 10px 18px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255,255,255,0.92);
            box-shadow: var(--shadow-xs);
        }

        .control-hint {
            font-size: 0.84rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: -2px;
        }

        .bulb-container {
            width: clamp(214px, 29vw, 272px);
            height: clamp(214px, 29vw, 272px);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0 4px;
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 28%, rgba(239,245,255,0.98) 100%);
            border: 10px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                inset 0 3px 10px rgba(255,255,255,0.9),
                inset 0 -12px 22px rgba(173, 214, 255, 0.26),
                0 20px 42px rgba(94, 121, 180, 0.16),
                0 8px 18px rgba(109, 94, 252, 0.08);
            transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
        }

        .bulb-container::before {
            content: "";
            position: absolute;
            inset: 18px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.70) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
        }

        .bulb-container:hover {
            transform: translateY(-3px) scale(1.015);
            box-shadow:
                inset 0 3px 10px rgba(255,255,255,0.95),
                inset 0 -12px 22px rgba(173, 214, 255, 0.28),
                0 26px 52px rgba(94, 121, 180, 0.18),
                0 12px 22px rgba(109, 94, 252, 0.10);
        }

        .bulb-container.active {
            transform: scale(0.96);
            background:
                radial-gradient(circle at 50% 45%, #fffef4 0%, #fff6bc 42%, #ffe27b 100%);
            box-shadow:
                inset 0 4px 16px rgba(255,255,255,0.96),
                inset 0 -10px 18px rgba(255, 204, 64, 0.24),
                0 0 0 10px rgba(255, 226, 123, 0.32),
                0 24px 54px rgba(255, 199, 65, 0.28);
        }

        .bulb-svg {
            width: clamp(88px, 10vw, 112px);
            height: clamp(88px, 10vw, 112px);
            fill: #cfdae8;
            position: relative;
            z-index: 2;
            transition: all 0.2s ease;
        }

        .bulb-container.active .bulb-svg {
            fill: var(--yellow);
            filter: drop-shadow(0 0 18px rgba(255, 216, 77, 0.58));
        }

        .glow-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 216, 77, 0.28) 0%, rgba(255, 216, 77, 0.10) 40%, rgba(255, 216, 77, 0) 72%);
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1;
        }

        .bulb-container.active .glow-ring {
            opacity: 1;
            animation: pulse 1.45s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.44;
            }
            55% {
                transform: scale(1.18);
                opacity: 0.18;
            }
            100% {
                transform: scale(1.36);
                opacity: 0;
            }
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .signal-toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.93rem;
            font-weight: 800;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255,255,255,0.92);
            box-shadow: var(--shadow-xs);
        }

        .signal-toggle-label input {
            width: 18px;
            height: 18px;
            accent-color: var(--blue);
            flex-shrink: 0;
        }

        .signal-pills {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            min-height: 68px;
            padding: 16px 20px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(244,248,255,0.96) 100%);
            border: 1px solid rgba(255,255,255,0.95);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), var(--shadow-sm);
        }

        .signal-pills.hidden {
            display: none;
        }

        .sig-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dbe4f1 0%, #cbd5e1 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8);
            transition: all 0.26s ease;
        }

        .sig-dot.on-dot {
            background: linear-gradient(135deg, #ff96c8 0%, #ff5fa7 100%);
            box-shadow:
                0 0 0 4px rgba(255, 119, 183, 0.12),
                0 0 16px rgba(255, 119, 183, 0.28);
            transform: scale(1.08);
        }

        .sig-dot.on-dash {
            width: 30px;
            border-radius: 10px;
            background: linear-gradient(135deg, #7bc8ff 0%, #42a5ff 100%);
            box-shadow:
                0 0 0 4px rgba(66, 165, 255, 0.10),
                0 0 16px rgba(66, 165, 255, 0.24);
        }

        #statusHint {
            min-width: 220px;
            padding: 12px 18px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--text-secondary);
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.92);
            box-shadow: var(--shadow-xs);
        }

        .guide-panel {
            justify-content: center;
        }

        .guide-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 1.16rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        .guide-header-icon {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.08rem;
            border-radius: 14px;
            background: linear-gradient(135deg, #ede9ff 0%, #dff2ff 100%);
            box-shadow: var(--shadow-xs);
        }

        .guide-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.97) 0%, rgba(247,250,255,0.97) 100%);
            border: 1px solid rgba(255,255,255,0.95);
            box-shadow: var(--shadow-xs);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .guide-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: rgba(109, 94, 252, 0.24);
        }

        .guide-num {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            font-size: 1.14rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, #7a6dff 0%, #42a5ff 100%);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.18);
        }

        .guide-code {
            flex: 1;
            text-align: center;
            padding: 10px 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, #eef5ff 0%, #ecfffd 100%);
            color: #2563eb;
            font-family: "Courier New", monospace;
            font-size: 1.34rem;
            font-weight: 900;
            letter-spacing: 2px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        .btn {
            min-height: 56px;
            padding: 14px 18px;
            border: none;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.97rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: var(--shadow-md);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            filter: saturate(1.04);
        }

        .btn:active {
            transform: translateY(1px) scale(0.99);
        }

        .btn-primary {
            color: #ffffff;
            background: linear-gradient(135deg, #5f8fff 0%, #42a5ff 55%, #2b7fff 100%);
        }

        .btn-success {
            color: #ffffff;
            background: linear-gradient(135deg, #48dfba 0%, #27cda6 55%, #12b886 100%);
        }

        .btn-neutral {
            color: var(--text-secondary);
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #e2e8f0;
        }

        #modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(17, 24, 39, 0.34);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-card {
            position: relative;
            overflow: hidden;
            width: min(92vw, 440px);
            padding: 36px 28px 28px;
            text-align: center;
            border-radius: 32px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,255,0.98) 100%);
            border: 1px solid rgba(255,255,255,0.96);
            box-shadow: 0 28px 72px rgba(53, 68, 103, 0.26);
        }

        .modal-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top center, rgba(109,94,252,0.10) 0%, rgba(109,94,252,0) 36%),
                linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 26%);
            pointer-events: none;
        }

        .modal-card > * {
            position: relative;
            z-index: 1;
        }

        .modal-title {
            font-size: 1.22rem;
            font-weight: 900;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .result-text {
            margin: 20px 0 28px;
            font-size: clamp(3.4rem, 10vw, 4.8rem);
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.06em;
            background: linear-gradient(135deg, #6d5efc 0%, #42a5ff 58%, #27cda6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-wrap: balance;
        }

        @media (max-width: 980px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 18px;
            }

            .card {
                padding: 22px;
                border-radius: 28px;
            }

            .button-group {
                grid-template-columns: 1fr;
                max-width: none;
            }

            .btn {
                min-height: 54px;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .app-shell {
                gap: 18px;
            }

            .sub-description {
                padding: 10px 14px;
                font-size: 0.9rem;
            }

            .guide-grid {
                grid-template-columns: 1fr;
            }

            .guide-item {
                padding: 14px;
            }

            .guide-code {
                font-size: 1.22rem;
            }

            .signal-pills {
                min-height: 62px;
                padding: 14px 16px;
                gap: 8px;
            }

            #statusHint {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="header-content">
            <h1>빛으로 숫자 신호 보내기</h1>
            <div class="sub-description">
                <span class="sub-pill">🔘 짧게는 점</span>
                <span class="sub-pill">➖ 길게는 선</span>
            </div>
        </div>
    </header>

    <div class="main-grid">
        <div class="card">
            <div class="interaction-zone">
                <span class="label-badge">💡 전구를 눌러 신호 보내기</span>
                <span class="control-hint">(SPACE 키, 전구 누르기)</span>

                <div class="bulb-container" id="inputArea">
                    <div class="glow-ring"></div>
                    <svg class="bulb-svg" viewBox="0 0 24 24">
                        <path d="M12,2A7,7 0 0,0 5,9C5,11.38 6.19,13.47 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.47 19,11.38 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z" />
                    </svg>
                </div>

                <div class="status-container" style="display:flex; flex-direction:column; align-items:center; gap:16px; width:100%;">
                    <label class="signal-toggle-label">
                        <input type="checkbox" id="showSignalToggle" checked>
                        <span>신호 실시간 표시</span>
                    </label>

                    <div class="signal-pills" id="signalTrack">
                        <div class="sig-dot"></div>
                        <div class="sig-dot"></div>
                        <div class="sig-dot"></div>
                        <div class="sig-dot"></div>
                        <div class="sig-dot"></div>
                    </div>

                    <div id="statusHint">신호를 입력하세요</div>
                </div>
            </div>
        </div>

        <div class="card guide-panel">
            <div class="guide-header">
                <span class="guide-header-icon">🔢</span>
                <span>모스 숫자표</span>
            </div>
            <div class="guide-grid">
                <div class="guide-item"><span class="guide-num">1</span><span class="guide-code">·----</span></div>
                <div class="guide-item"><span class="guide-num">6</span><span class="guide-code">-····</span></div>
                <div class="guide-item"><span class="guide-num">2</span><span class="guide-code">··---</span></div>
                <div class="guide-item"><span class="guide-num">7</span><span class="guide-code">--···</span></div>
                <div class="guide-item"><span class="guide-num">3</span><span class="guide-code">···--</span></div>
                <div class="guide-item"><span class="guide-num">8</span><span class="guide-code">---··</span></div>
                <div class="guide-item"><span class="guide-num">4</span><span class="guide-code">····-</span></div>
                <div class="guide-item"><span class="guide-num">9</span><span class="guide-code">----·</span></div>
                <div class="guide-item"><span class="guide-num">5</span><span class="guide-code">·····</span></div>
                <div class="guide-item"><span class="guide-num">0</span><span class="guide-code">-----</span></div>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-primary" id="sendBtn">
            <span>💾</span> 숫자 저장
        </button>
        <button class="btn btn-success" id="checkBtn">
            <span>🔍</span> 숫자 확인
        </button>
        <button class="btn btn-neutral" id="resetBtn">
            지우기
        </button>
    </div>
</div>

<div id="modal">
    <div class="modal-card">
        <h2 class="modal-title">해석된 결과입니다</h2>
        <div class="result-text" id="modalResult">?</div>
        <button class="btn btn-success" style="width: 100%" onclick="closeModal()">다시 하기</button>
    </div>
</div>

<script>
    const inputArea = document.getElementById('inputArea');
    const signalTrack = document.getElementById('signalTrack');
    const showSignalToggle = document.getElementById('showSignalToggle');
    const sendBtn = document.getElementById('sendBtn');
    const checkBtn = document.getElementById('checkBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusHint = document.getElementById('statusHint');
    const modal = document.getElementById('modal');
    const modalResult = document.getElementById('modalResult');

    let isPressing = false;
    let pressStartTime = 0;
    let currentSequence = [];
    let savedNumbers = [];

    const morseMap = {
        ".----": "1", "..---": "2", "...--": "3", "....-": "4", ".....": "5",
        "-....": "6", "--...": "7", "---..": "8", "----.": "9", "-----": "0"
    };

    showSignalToggle.addEventListener('change', (e) => {
        if (e.target.checked) signalTrack.classList.remove('hidden');
        else signalTrack.classList.add('hidden');
    });

    function setStatus(text) {
        statusHint.innerText = text;
    }

    function startSignal(e) {
        if (e && e.cancelable) e.preventDefault();
        if (isPressing || currentSequence.length >= 5) return;
        isPressing = true;
        pressStartTime = Date.now();
        inputArea.classList.add('active');
        setStatus("송신 중...");
    }

    function endSignal(e) {
        if (e && e.cancelable) e.preventDefault();
        if (!isPressing) return;

        const duration = Date.now() - pressStartTime;
        isPressing = false;
        inputArea.classList.remove('active');

        const symbol = (duration < 250) ? "." : "-";
        currentSequence.push(symbol);
        updateUI();

        setStatus(currentSequence.length === 5 ? "입력 완료! [저장]을 누르세요" : "다음 신호를 입력하세요");
    }

    function cancelSignalState() {
        if (!isPressing) return;
        isPressing = false;
        inputArea.classList.remove('active');
        setStatus(currentSequence.length === 0 ? "전구를 눌러 시작하세요" : "다음 신호 대기 중");
    }

    function updateUI() {
        const dots = signalTrack.querySelectorAll('.sig-dot');
        dots.forEach((dot, idx) => {
            dot.className = 'sig-dot';
            if (currentSequence[idx] === '.') dot.classList.add('on-dot');
            if (currentSequence[idx] === '-') dot.classList.add('on-dash');
        });
    }

    function sendCurrentDigit() {
        if (currentSequence.length < 5) {
            setStatus(currentSequence.length === 0 ? "먼저 신호를 입력해 주세요" : "5개를 모두 채워야 합니다");
            return;
        }

        const code = currentSequence.join('');
        const identifiedDigit = morseMap[code] || "?";
        savedNumbers.push(identifiedDigit);
        currentSequence = [];
        updateUI();

        setStatus(identifiedDigit === "?" ? "알 수 없는 신호입니다" : "저장 성공! 다음 숫자를 입력하세요");
    }

    function showFinalResult() {
        if (savedNumbers.length === 0 && currentSequence.length === 0) {
            setStatus("전송할 데이터가 없습니다");
            return;
        }

        if (currentSequence.length > 0 && currentSequence.length < 5) {
            setStatus("작성 중인 신호가 남았습니다");
            return;
        }

        let displayMessage = [...savedNumbers];
        if (currentSequence.length === 5) {
            const lastCode = currentSequence.join('');
            displayMessage.push(morseMap[lastCode] || "?");
        }

        modalResult.innerText = displayMessage.join('');
        modal.style.display = "flex";
    }

    function resetAll() {
        isPressing = false;
        currentSequence = [];
        savedNumbers = [];
        inputArea.classList.remove('active');
        updateUI();
        setStatus("초기화되었습니다");
    }

    function closeModal() {
        modal.style.display = "none";
        resetAll();
    }

    inputArea.addEventListener('mousedown', startSignal);
    window.addEventListener('mouseup', endSignal);
    inputArea.addEventListener('mouseleave', cancelSignalState);

    inputArea.addEventListener('touchstart', startSignal, { passive: false });
    inputArea.addEventListener('touchend', endSignal, { passive: false });
    inputArea.addEventListener('touchcancel', cancelSignalState, { passive: false });

    window.addEventListener('blur', cancelSignalState);

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !isPressing) {
            e.preventDefault();
            startSignal();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            endSignal();
        }
    });

    sendBtn.addEventListener('click', sendCurrentDigit);
    checkBtn.addEventListener('click', showFinalResult);
    resetBtn.addEventListener('click', resetAll);
</script>
</body>
</html>
